<!DOCTYPE html>
<html lang="it" data-palette="switch">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pack-a-Punchliner</title>
    <script src="js/tailwind.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="min-h-screen p-4 md:p-8">

    <!-- MOBILE TOPBAR -->
    <div id="mobileTopbar">
        <h1>PACK-A-PUNCHLINER</h1>
        <div style="display:flex;align-items:center;gap:4px;flex-shrink:0;">
            <span style="font-family:'Rajdhani',sans-serif;font-size:0.58rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.4);">TEMA:</span>
            <select id="paletteSelectorMobile" onchange="applyPalette(this.value)" class="palette-select">
            </select>
        </div>
    </div>

    <!-- DISPLAY AREA: sempre nel DOM, posizionato via CSS -->
    <div id="displayArea" class="cyber-container rounded-3xl p-10 flex flex-col items-center justify-center text-center" style="height: 450px; overflow: hidden;">
        <p class="theme-waiting uppercase text-xs">In attesa...</p>
    </div>

    <!-- DESKTOP WRAPPER -->
    <div class="max-w-5xl mx-auto desktop-only">
        <header class="text-center mb-6">
            <h1 class="text-5xl md:text-6xl font-extrabold uppercase tracking-wider">
                <span style="background: var(--title-grad); -webkit-background-clip: text; background-clip: text; color: transparent; text-shadow: none; display: inline; filter: drop-shadow(0 0 8px rgba(var(--neon-cyan-rgb),0.4));">PACK-A-PUNCHLINER</span>
            </h1>
            <div class="hidden md:flex items-center justify-center gap-6 mt-4">
                <p class="theme-muted font-mono uppercase tracking-widest text-sm">
                    Premi <kbd class="px-2 py-1 rounded text-xs theme-kbd">SPAZIO</kbd> per generare
                </p>
                <div style="display:flex;align-items:center;gap:6px;">
                    <span style="font-family:'Rajdhani',sans-serif;font-size:0.7rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.35);">TEMA:</span>
                    <select id="paletteSelectorDesktop" onchange="applyPalette(this.value)" class="palette-select" style="font-size:0.7rem;padding:4px 10px;border-radius:8px;">
                    </select>
                </div>
            </div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-8 space-y-6">
                <div id="displayAreaSlot"></div>
                <div class="flex flex-col sm:flex-row gap-4 items-center justify-center">
                    <div class="flex flex-row items-center justify-center gap-4 w-full sm:w-auto">
                        <div class="flex items-center gap-1 px-4 py-2 rounded-full h-[58px]" style="background:var(--bg-dark);border:1px solid rgba(var(--neon-cyan-rgb),0.2);">
                            <button onclick="adjustCount(-1)" class="w-8 h-8 flex items-center justify-center font-bold text-xl" style="color:var(--neon-cyan);background:none;border:none;cursor:pointer;font-family:'Rajdhani',sans-serif;">−</button>
                            <input type="number" id="wordCountDesktop" value="1" min="1" max="10" readonly
                                   class="bg-transparent border-none w-10 text-center text-white font-bold text-xl outline-none focus:ring-0" style="pointer-events:none;">
                            <button onclick="adjustCount(1)" class="w-8 h-8 flex items-center justify-center font-bold text-xl" style="color:var(--neon-cyan);background:none;border:none;cursor:pointer;font-family:'Rajdhani',sans-serif;">+</button>
                        </div>
                        <button onclick="generate()" class="cyber-button button-primary px-12 py-4 text-lg flex-1 sm:flex-none h-[58px]">GENERA</button>
                    </div>
                    <button onclick="resetDeck()" class="cyber-button px-8 py-4 text-xs h-[58px] w-full sm:w-auto">SHUFFLE</button>
                </div>
            </div>

            <div class="lg:col-span-4 space-y-6">
                <div class="rounded-2xl p-6" style="background:var(--bg-dark);border:1px solid rgba(var(--neon-cyan-rgb),0.15);">
                    <h3 class="text-[10px] theme-label font-bold uppercase mb-4 tracking-widest">Filtri Categoria</h3>
                    <div id="tagFilters" class="flex flex-wrap gap-2"></div>
                </div>
                <div class="space-y-4">
                    <button onclick="openEditor()" class="cyber-button w-full py-4 text-sm">Apri Database</button>
                    <div class="grid grid-cols-2 gap-4">
                        <button onclick="exportData()" class="cyber-button py-2 text-[10px]">Export</button>
                        <button onclick="document.getElementById('importFile').click()" class="cyber-button py-2 text-[10px]">Import</button>
                    </div>
                    <button onclick="loadDefaultDB()" class="cyber-button button-orange w-full py-3 text-[10px] border-dashed">Carica DB Default</button>
                    <a href="https://github.com/bonjirum/WGEN/blob/master/README.md" target="_blank" class="cyber-button button-green w-full py-3 text-[10px] mt-2">
                        MANUALE
                    </a>
                    <input type="file" id="importFile" class="hidden" accept=".json" onchange="importData(event)">
                </div>
            </div>
        </main>
    </div>

    <!-- MOBILE BOTTOMBAR -->
    <div id="mobileBottombar">
        <div class="mob-counter">
            <button onclick="adjustCount(-1)" style="font-family:'Rajdhani',sans-serif;font-weight:700;">−</button>
            <input type="number" id="wordCount" value="1" min="1" max="10" readonly style="pointer-events:none;">
            <button onclick="adjustCount(1)" style="font-family:'Rajdhani',sans-serif;font-weight:700;">+</button>
        </div>
        <button onclick="generate()" class="cyber-button button-primary text-sm flex-1" style="height:46px;letter-spacing:3px;">GENERA</button>
        <button id="menuBtn" onclick="toggleDrawer()">
            <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
        </button>
    </div>

    <!-- DRAWER OVERLAY -->
    <div id="drawerOverlay" onclick="closeDrawer()"></div>

    <!-- MOBILE DRAWER -->
    <div id="drawer">
        <div class="drawer-handle"></div>
        <div class="mb-3">
            <div class="flex items-center justify-between mb-2">
                <h3 class="text-[10px] theme-label font-bold uppercase tracking-widest">Filtri Categoria</h3>
                <button onclick="resetDeck();closeDrawer();" class="cyber-button px-3 py-1 text-[10px]">Shuffle</button>
            </div>
            <div id="tagFiltersMobile" class="flex flex-wrap gap-2"></div>
        </div>
        <div style="height:1px;background:rgba(var(--neon-cyan-rgb),0.1);margin:10px 0;"></div>
        <div class="flex flex-col gap-2">
            <button onclick="openEditor();closeDrawer();" class="cyber-button w-full py-3 text-sm">Apri Database</button>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="exportData()" class="cyber-button py-2 text-[10px]">Export</button>
                <button onclick="document.getElementById('importFile').click()" class="cyber-button py-2 text-[10px]">Import</button>
            </div>
            <button onclick="loadDefaultDB()" class="cyber-button button-orange w-full py-2 text-[10px] border-dashed">Carica DB Default</button>
            <a href="https://github.com/bonjirum/WGEN/blob/master/README.md" target="_blank" class="cyber-button button-green w-full py-2 text-[10px]">MANUALE</a>
        </div>
    </div>

    <div id="editorModal">
        <div class="max-w-6xl mx-auto">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-3xl font-bold theme-label uppercase tracking-widest">Database Editor</h2>
                <button onclick="closeEditor()" class="w-12 h-12 flex items-center justify-center rounded-full text-2xl theme-border" style="border:1px solid;color:var(--neon-pink);opacity:0.6;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.6">×</button>
            </div>

            <!-- Toggle aggiungi voci — solo mobile -->
            <div class="lg:hidden mb-3">
                <button onclick="toggleAddSection()" id="toggleAddBtn" class="cyber-button w-full py-3 text-sm">+ Aggiungi Voci</button>
            </div>

            <div id="addSection" class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-6">
                <div class="lg:col-span-2">
                    <textarea id="newWords" rows="4" placeholder="Mela&#10;Pera&#10;..." class="cyber-input w-full rounded-xl p-4 text-sm font-mono h-32"></textarea>
                </div>
                <div class="space-y-4">
                    <div class="text-[10px] theme-muted uppercase font-bold mb-1">Tag Rapidi:</div>
                    <div id="quickSelectTags" class="flex flex-wrap gap-1 mb-2 max-h-24 overflow-y-auto p-2 theme-panel-dark rounded-lg"></div>
                    <input type="text" id="newTags" placeholder="Frutta, Dolci, ..." class="cyber-input w-full rounded-xl p-4 text-sm font-bold">
                    <button onclick="addWordsBulk()" class="cyber-button w-full py-4 font-bold">AGGIUNGI</button>
                </div>
            </div>

            <div id="tableContainer" class="rounded-2xl p-6" style="background:var(--bg-dark);border:1px solid rgba(var(--neon-cyan-rgb),0.15);">
                <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6">
                    <input type="text" id="tableSearch" oninput="handleTableSearch()" placeholder="Cerca..." class="cyber-input w-full sm:w-80 rounded-lg px-4 py-2 text-xs">
                    <div id="archiveTagFilters" class="flex flex-wrap gap-2"></div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="theme-panel-dark">
                            <tr>
                                <th class="p-4 theme-muted font-bold uppercase text-[10px]">Entità</th>
                                <th class="p-4 theme-muted font-bold uppercase text-[10px]">Tag</th>
                                <th class="p-4 text-right theme-muted font-bold uppercase text-[10px]">Azione</th>
                            </tr>
                        </thead>
                        <tbody id="wordTableBody" class="theme-divide text-sm font-mono"></tbody>
                    </table>
                </div>
                <div id="paginationBar" class="flex justify-between items-center mt-6">
                    <span id="paginationInfo" class="text-[10px] theme-muted font-bold uppercase"></span>
                    <div class="flex gap-2">
                        <button onclick="prevPage()" class="cyber-button px-4 py-1 text-[10px]">Indietro</button>
                        <button onclick="nextPage()" class="cyber-button px-4 py-1 text-[10px]">Avanti</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
