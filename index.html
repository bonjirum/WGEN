<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pack-a-Punchliner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- un banale counter visitatori, niente di sketchy controllate pure -->
    <script data-goatcounter="https://bonjirum.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap');

        :root {
            --neon-cyan: #00fff2;
            --neon-cyan-rgb: 0,255,242;
            --neon-pink: #ff00ff;
            --bg-dark: #050b14;
            --bg-drawer: #0d1626;
            --bg-panel: #0a1120;
            --topbar-h: 46px;
            --bottombar-h: 68px;
        }

        /* PALETTE: RETROWAVE */
        :root[data-palette="retrowave"] {
            --grad-rgb-1: 222, 26, 88;
            --grad-rgb-2: 246, 125, 49;
            --neon-cyan: #DE1A58;
            --neon-cyan-rgb: 222,26,88;
            --neon-pink: #F67D31;
            --bg-dark: #07011a;
            --bg-drawer: #130838;
            --bg-panel: #0f0230;
            --alt-color: #F67D31;
            --title-grad: linear-gradient(to right, #1A05A2 0%, #DE1A58 50%, #F67D31 100%);
            --neon-pink-dark: #c55a10;
            --neon-pink-glow: rgba(246,125,49,0.45);
            --btn-primary-text: #fff;
        }

        /* PALETTE: FUTURE */
        :root[data-palette="marvin"] {
            --neon-cyan: #00ADB5;
            --neon-cyan-rgb: 0,173,181;
            --neon-pink: #00ADB5;
            --bg-dark: #222831;
            --bg-drawer: #2d3542;
            --bg-panel: #ffffff;
            --alt-color: #000000;
            --title-grad: linear-gradient(to right, #00ADB5 0%, #EEEEEE 50%, #00ADB5 100%);
            --neon-pink-dark: #007a80;
            --neon-pink-glow: rgba(0,173,181,0.45);
            --btn-primary-text: #fff;
        }

        /* PALETTE: SWITCH */
        :root[data-palette="switch"] {
            --grad-rgb-1: 8, 217, 214;
            --grad-rgb-2: 255, 46, 99;
            --neon-cyan: #08D9D6;
            --neon-cyan-rgb: 8,217,214;
            --neon-pink: #FF2E63;
            --bg-dark: #252A34;
            --bg-drawer: #303845;
            --bg-panel: #2e3446;
            --alt-color: #FF2E63;
            --title-grad: linear-gradient(to right, #08D9D6 0%, #EAEAEA 50%, #FF2E63 100%);
            --neon-pink-dark: #c0003d;
            --neon-pink-glow: rgba(255,46,99,0.45);
            --btn-primary-text: #fff;
        }

        /* PALETTE: CYBERPUNK (default) */
        :root[data-palette="cyberpunk"], :root {
            --grad-rgb-1: 0, 255, 242;
            --grad-rgb-2: 188, 19, 254;
            --alt-color: #ffffff;
            --title-grad: linear-gradient(to right, var(--neon-cyan) 0%, white 50%, var(--neon-pink) 100%);
            --neon-pink-dark: #c000c0;
            --neon-pink-glow: rgba(255,0,255,0.45);
            --btn-primary-text: #fff;
        }

        * { touch-action: manipulation; }

        * {
            touch-action: manipulation;
        }

        html, body {
            touch-action: manipulation;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg-dark);
            color: #e2e8f0;
            background-image:
                radial-gradient(circle at 10% 20%, rgba(var(--grad-rgb-1), var(--grad-opacity, 0.05)) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(var(--grad-rgb-2), var(--grad-opacity, 0.05)) 0%, transparent 20%);
        }

        .cyber-container {
            background: var(--bg-panel);
            border: 1px solid rgba(0, 255, 242, 0.2);
            box-shadow: 0 0 15px rgba(0, 255, 242, 0.1), inset 0 0 20px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }

        /* --- STILE KBD (RIPRISTINATO) --- */
        kbd {
            display: inline-block;
            padding: 2px 10px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--neon-cyan);
            background: rgba(0, 255, 242, 0.05);
            border: 1px solid rgba(0, 255, 242, 0.4);
            border-radius: 6px;
            box-shadow: 0 0 8px rgba(0, 255, 242, 0.2);
            margin: 0 4px;
            text-transform: uppercase;
        }

        /* --- BOTTONI --- */
        .cyber-button {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 0.82rem;
            letter-spacing: 0.03em;
            padding: 11px 24px;
            border-radius: 10px;
            cursor: pointer;
            transition: box-shadow 0.2s ease, border-color 0.2s ease, background 0.2s ease, color 0.2s ease;
            display: inline-flex; align-items: center; justify-content: center;
            gap: 8px;
            white-space: nowrap;
            background: rgba(var(--neon-cyan-rgb, 0,255,242), 0.04);
            color: var(--neon-cyan);
            border: 1px solid rgba(var(--neon-cyan-rgb, 0,255,242), 0.25);
            text-transform: uppercase;
            opacity: 0.75;
        }

        .cyber-button:hover:not(:disabled) {
            border-color: rgba(var(--neon-cyan-rgb, 0,255,242), 0.6);
            opacity: 1;
            box-shadow: 0 0 12px rgba(var(--neon-cyan-rgb, 0,255,242), 0.15);
        }
        .cyber-button:active { opacity: 0.6; }

        .button-primary {
            background: linear-gradient(135deg, var(--neon-pink), var(--neon-pink-dark)) !important;
            color: var(--btn-primary-text, #fff) !important;
            border: none !important;
            font-weight: 600 !important;
        }
        .button-primary:hover:not(:disabled) {
            box-shadow: 0 0 20px var(--neon-pink-glow) !important;
            color: var(--btn-primary-text, #fff) !important;
        }

        .cyber-toast {
            position: fixed; top: 20px; right: 20px;
            background: var(--bg-panel); border-left: 4px solid var(--neon-cyan);
            color: var(--neon-cyan); padding: 15px 25px; border-radius: 4px;
            box-shadow: 0 0 20px rgba(0, 255, 242, 0.3); z-index: 1001;
            font-weight: bold; text-transform: uppercase; letter-spacing: 1px;
            font-size: 0.75rem; pointer-events: none;
        }

        @media (max-width: 1023px) {
            .cyber-toast {
                top: var(--topbar-h);
                right: 0; left: 0;
                border-radius: 0;
                border-left: none;
                border-bottom: 2px solid var(--neon-cyan);
                text-align: center;
                padding: 10px 16px;
                font-size: 0.68rem;
            }
        }

        /* Arancione per Carica DB */
        .button-orange {
            background: linear-gradient(135deg, #f97316, #ea580c) !important;
            color: #fff !important;
            border: none !important;
        }
        .button-orange:hover:not(:disabled) {
            box-shadow: 0 0 18px rgba(249,115,22,0.4) !important;
            color: #fff !important;
        }

        /* Verde per Manuale */
        .button-green {
            background: linear-gradient(135deg, #22c55e, #16a34a) !important;
            color: #fff !important;
            border: none !important;
        }
        .button-green:hover:not(:disabled) {
            box-shadow: 0 0 18px rgba(34,197,94,0.35) !important;
            color: #fff !important;
        }

        #editorModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); z-index: 100;
            display: none; overflow-y: auto; padding: 1rem;
        }

        .cyber-input {
            background: rgba(7, 14, 26, 0.8) !important;
            border: 1px solid rgba(30, 41, 59, 0.7) !important;
            color: var(--neon-cyan) !important; outline: none;
        }

        .cursor-edit:hover {
            background: rgba(0, 255, 242, 0.05);
            cursor: text;
        }


        /* ══ MOBILE ONLY ══ */
        @media (max-width: 1023px) {
            html, body { height: 100dvh; overflow: hidden; padding: 0 !important; margin: 0; }
            .desktop-only { display: none !important; }

            #mobileTopbar {
                position: fixed; top: 0; left: 0; right: 0;
                height: var(--topbar-h);
                display: flex; align-items: center; justify-content: space-between;
                padding: 0 14px;
                background: var(--bg-dark);
                border-bottom: 1px solid rgba(0,255,242,0.15);
                z-index: 50;
            }
            #mobileTopbar h1 {
                font-size: 0.82rem; font-weight: 800;
                letter-spacing: 0.14em; text-transform: uppercase;
                background: var(--title-grad);
                -webkit-background-clip: text; background-clip: text;
                color: transparent; white-space: nowrap;
                display: inline-block;
            }
            #displayArea {
                position: fixed !important;
                top: var(--topbar-h) !important; left: 0 !important;
                right: 0 !important; bottom: var(--bottombar-h) !important;
                height: auto !important;
                border-radius: 0 !important;
                border-left: none !important; border-right: none !important;
                padding: 16px !important;

            }
            #mobileBottombar {
                position: fixed; bottom: 0; left: 0; right: 0;
                height: var(--bottombar-h);
                display: flex; align-items: center; gap: 8px; padding: 0 10px;
                background: var(--bg-dark);
                border-top: 1px solid rgba(0,255,242,0.15);
                z-index: 50;
            }
            .mob-counter {
                display: flex; align-items: center;
                background: var(--bg-panel);
                border: 1px solid rgba(0,255,242,0.2);
                border-radius: 999px; padding: 0 6px;
                height: 46px; flex-shrink: 0;
            }
            .mob-counter button {
                width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
                color: var(--neon-cyan); font-size: 1.3rem; font-weight: bold;
                background: none; border: none; font-family: 'Rajdhani', sans-serif;
            }
            .mob-counter input {
                background: transparent; border: none; width: 26px; text-align: center;
                color: var(--neon-cyan); font-weight: bold; font-size: 1.05rem;
                outline: none; font-family: 'Rajdhani', sans-serif;
            }
            #menuBtn {
                width: 46px; height: 46px; flex-shrink: 0;
                display: flex; align-items: center; justify-content: center;
                background: var(--bg-panel); border: 1px solid rgba(0,255,242,0.2);
                border-radius: 10px; color: var(--neon-cyan);
            }
            #drawerOverlay {
                position: fixed; inset: 0; z-index: 48;
                background: rgba(0,0,0,0.55); display: none;
            }
            #drawerOverlay.open { display: block; }
            #drawer {
                position: fixed; bottom: var(--bottombar-h); left: 0; right: 0;
                background: var(--bg-drawer);
                border-top: 1px solid rgba(var(--neon-cyan-rgb, 0,255,242),0.2);
                border-radius: 18px 18px 0 0; z-index: 49;
                transform: translateY(100%);
                transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
                max-height: calc(100dvh - var(--topbar-h) - var(--bottombar-h));
                overflow-y: auto; padding: 10px 14px 18px;
            }
            #drawer.open { transform: translateY(0); }
            .drawer-handle {
                width: 36px; height: 4px;
                background: rgba(0,255,242,0.2);
                border-radius: 2px; margin: 0 auto 12px;
            }
        }
        @media (min-width: 1024px) {
            #mobileTopbar, #mobileBottombar, #drawer, #drawerOverlay { display: none !important; }
            body { display: block; }
            /* displayArea torna statico e va nel grid tramite JS */
        }
        .palette-select {
            background: var(--bg-dark) !important;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            padding: 2px 6px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--neon-cyan);
            outline: none;
            cursor: pointer;
        }

        .animate-fade { animation: bounce-in 0.3s ease-out; }
        @keyframes bounce-in { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <!-- MOBILE TOPBAR -->
    <div id="mobileTopbar">
        <h1>PACK-A-PUNCHLINER</h1>
        <div style="display:flex;align-items:center;gap:4px;flex-shrink:0;">
            <span style="font-family:'Rajdhani',sans-serif;font-size:0.58rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.4);">TEMA:</span>
            <select id="paletteSelectorMobile" onchange="applyPalette(this.value)" class="palette-select">
            </select>
        </div>
    </div>

    <!-- DISPLAY AREA: sempre nel DOM, posizionato via CSS -->
    <div id="displayArea" class="cyber-container rounded-3xl p-10 flex flex-col items-center justify-center text-center" style="height: 450px; overflow: hidden;">
        <p class="text-slate-600 italic uppercase text-xs">In attesa...</p>
    </div>

    <!-- DESKTOP WRAPPER -->
    <div class="max-w-5xl mx-auto desktop-only">
        <header class="text-center mb-6">
            <h1 class="text-5xl md:text-6xl font-extrabold uppercase tracking-wider">
                <span style="background: var(--title-grad); -webkit-background-clip: text; background-clip: text; color: transparent; text-shadow: none; display: inline; filter: drop-shadow(0 0 8px rgba(0,255,242,0.4));">PACK-A-PUNCHLINER</span>
            </h1>
            <div class="hidden md:flex items-center justify-center gap-6 mt-4">
                <p class="text-cyan-800 font-mono uppercase tracking-widest text-sm">
                    Premi <kbd class="px-2 py-1 bg-slate-900 border border-cyan-900 rounded text-xs text-cyan-400">SPAZIO</kbd> per generare
                </p>
                <div style="display:flex;align-items:center;gap:6px;">
                    <span style="font-family:'Rajdhani',sans-serif;font-size:0.7rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.35);">TEMA:</span>
                    <select id="paletteSelectorDesktop" onchange="applyPalette(this.value)" class="palette-select" style="font-size:0.7rem;padding:4px 10px;border-radius:8px;">
                    </select>
                </div>
            </div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-8 space-y-6">
                <div id="displayAreaSlot"></div>
                <div class="flex flex-col sm:flex-row gap-4 items-center justify-center">
                    <div class="flex flex-row items-center justify-center gap-4 w-full sm:w-auto">
                        <div class="flex items-center gap-1 px-4 py-2 rounded-full h-[58px]" style="background:var(--bg-dark);border:1px solid rgba(0,255,242,0.2);">
                            <button onclick="adjustCount(-1)" class="w-8 h-8 flex items-center justify-center font-bold text-xl" style="color:var(--neon-cyan);background:none;border:none;cursor:pointer;font-family:'Rajdhani',sans-serif;">−</button>
                            <input type="number" id="wordCountDesktop" value="1" min="1" max="10"
                                   class="bg-transparent border-none w-10 text-center text-white font-bold text-xl outline-none focus:ring-0">
                            <button onclick="adjustCount(1)" class="w-8 h-8 flex items-center justify-center font-bold text-xl" style="color:var(--neon-cyan);background:none;border:none;cursor:pointer;font-family:'Rajdhani',sans-serif;">+</button>
                        </div>
                        <button onclick="generate()" class="cyber-button button-primary px-12 py-4 text-lg flex-1 sm:flex-none h-[58px]">GENERA</button>
                    </div>
                    <button onclick="resetDeck()" class="cyber-button px-8 py-4 text-xs h-[58px] w-full sm:w-auto">SHUFFLE</button>
                </div>
            </div>

            <div class="lg:col-span-4 space-y-6">
                <div class="rounded-2xl p-6" style="background:var(--bg-dark);border:1px solid rgba(0,255,242,0.15);">
                    <h3 class="text-[10px] text-cyan-500 font-bold uppercase mb-4 tracking-widest">Filtri Categoria</h3>
                    <div id="tagFilters" class="flex flex-wrap gap-2"></div>
                </div>
                <div class="space-y-4">
                    <button onclick="openEditor()" class="cyber-button w-full py-4 text-sm">Apri Database</button>
                    <div class="grid grid-cols-2 gap-4">
                        <button onclick="exportData()" class="cyber-button py-2 text-[10px]">Export</button>
                        <button onclick="document.getElementById('importFile').click()" class="cyber-button py-2 text-[10px]">Import</button>
                    </div>
                    <button onclick="loadDefaultDB()" class="cyber-button button-orange w-full py-3 text-[10px] border-dashed">Carica DB Default</button>
                    <a href="https://github.com/bonjirum/WGEN/blob/master/README.md" target="_blank" class="cyber-button button-green w-full py-3 text-[10px] mt-2">
                        MANUALE
                    </a>
                    <input type="file" id="importFile" class="hidden" accept=".json" onchange="importData(event)">
                </div>
            </div>
        </main>
    </div>

    <!-- MOBILE BOTTOMBAR -->
    <div id="mobileBottombar">
        <div class="mob-counter">
            <button onclick="adjustCount(-1)" style="font-family:'Rajdhani',sans-serif;font-weight:700;">−</button>
            <input type="number" id="wordCount" value="1" min="1" max="10">
            <button onclick="adjustCount(1)" style="font-family:'Rajdhani',sans-serif;font-weight:700;">+</button>
        </div>
        <button onclick="generate()" class="cyber-button button-primary text-sm flex-1" style="height:46px;letter-spacing:3px;">GENERA</button>
        <button id="menuBtn" onclick="toggleDrawer()">
            <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
        </button>
    </div>

    <!-- DRAWER OVERLAY -->
    <div id="drawerOverlay" onclick="closeDrawer()"></div>

    <!-- MOBILE DRAWER -->
    <div id="drawer">
        <div class="drawer-handle"></div>
        <div class="mb-3">
            <div class="flex items-center justify-between mb-2">
                <h3 class="text-[10px] text-cyan-500 font-bold uppercase tracking-widest">Filtri Categoria</h3>
                <button onclick="resetDeck();closeDrawer();" class="cyber-button px-3 py-1 text-[10px]">Shuffle</button>
            </div>
            <div id="tagFiltersMobile" class="flex flex-wrap gap-2"></div>
        </div>
        <div style="height:1px;background:rgba(0,255,242,0.1);margin:10px 0;"></div>
        <div class="flex flex-col gap-2">
            <button onclick="openEditor();closeDrawer();" class="cyber-button w-full py-3 text-sm">Apri Database</button>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="exportData()" class="cyber-button py-2 text-[10px]">Export</button>
                <button onclick="document.getElementById('importFile').click()" class="cyber-button py-2 text-[10px]">Import</button>
            </div>
            <button onclick="loadDefaultDB()" class="cyber-button button-orange w-full py-2 text-[10px] border-dashed">Carica DB Default</button>
            <a href="https://github.com/bonjirum/WGEN/blob/master/README.md" target="_blank" class="cyber-button button-green w-full py-2 text-[10px]">MANUALE</a>
        </div>
    </div>

    <div id="editorModal">
        <div class="max-w-6xl mx-auto">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-bold text-cyan-500 uppercase tracking-widest">Database Editor</h2>
                <button onclick="closeEditor()" class="w-12 h-12 flex items-center justify-center border border-pink-900 text-pink-500 rounded-full hover:bg-pink-900/20 text-2xl">×</button>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-12">
                <div class="lg:col-span-2">
                    <textarea id="newWords" rows="4" placeholder="Mela&#10;Pera&#10;..." class="cyber-input w-full rounded-xl p-4 text-sm font-mono h-32"></textarea>
                </div>
                <div class="space-y-4">
                    <div class="text-[10px] text-slate-500 uppercase font-bold mb-1">Tag Rapidi:</div>
                    <div id="quickSelectTags" class="flex flex-wrap gap-1 mb-2 max-h-24 overflow-y-auto p-2 bg-slate-900/50 rounded-lg"></div>
                    <input type="text" id="newTags" placeholder="Frutta, Dolci, ..." class="cyber-input w-full rounded-xl p-4 text-sm font-bold">
                    <button onclick="addWordsBulk()" class="cyber-button w-full py-4 font-bold">AGGIUNGI</button>
                </div>
            </div>

            <div class="rounded-2xl p-6" style="background:var(--bg-dark);border:1px solid rgba(0,255,242,0.15);">
                <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6">
                    <input type="text" id="tableSearch" oninput="handleTableSearch()" placeholder="Cerca..." class="cyber-input w-full sm:w-80 rounded-lg px-4 py-2 text-xs">
                    <div id="archiveTagFilters" class="flex flex-wrap gap-2"></div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-900/80">
                            <tr>
                                <th class="p-4 text-cyan-700 font-bold uppercase text-[10px]">Entità</th>
                                <th class="p-4 text-cyan-700 font-bold uppercase text-[10px]">Tag</th>
                                <th class="p-4 text-right text-cyan-700 font-bold uppercase text-[10px]">Azione</th>
                            </tr>
                        </thead>
                        <tbody id="wordTableBody" class="divide-y divide-slate-800/30 text-sm font-mono"></tbody>
                    </table>
                </div>
                <div class="flex justify-between items-center mt-6">
                    <span id="paginationInfo" class="text-[10px] text-slate-500 font-bold uppercase"></span>
                    <div class="flex gap-2">
                        <button onclick="prevPage()" class="cyber-button px-4 py-1 text-[10px]">Indietro</button>
                        <button onclick="nextPage()" class="cyber-button px-4 py-1 text-[10px]">Avanti</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let words = JSON.parse(localStorage.getItem('myWords')) || [];
        let _firstLoad = words.length === 0;
        let activeTags = new Set();
        let archiveSearchTags = new Set();
        let currentPage = 1;
        let itemsPerPage = 12;
        let searchQuery = "";
        let currentDeck = [];
        let editingTagIndex = null;

        function save() { localStorage.setItem('myWords', JSON.stringify(words)); }
        function init() { renderTags(); renderArchiveSearchTags(); renderTable(); updateQuickSelect(); }

        async function loadDefaultDB() {
            try {
                const response = await fetch('db-argomenti-v1.json');
                if (!response.ok) throw new Error();
                words = await response.json();
                save(); init(); resetDeck();
                showNotification("DATABASE DEFAULT CARICATO");
            } catch (err) { showNotification("ERR: USA LIVE SERVER PER IL FILE JSON"); }
        }

        function openEditor() { document.getElementById('editorModal').style.display = 'block'; document.body.style.overflow = 'hidden'; init(); }
        function closeEditor() { document.getElementById('editorModal').style.display = 'none'; document.body.style.overflow = 'auto'; }

        let _toastTimeout = null;
        function showNotification(m) {
            // Rimuovi toast esistente
            const existing = document.querySelector('.cyber-toast');
            if (existing) existing.remove();
            if (_toastTimeout) clearTimeout(_toastTimeout);
            const t = document.createElement('div'); t.className = 'cyber-toast animate-fade'; t.innerText = m;
            document.body.appendChild(t);
            _toastTimeout = setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 400); }, 1500);
        }

        function resetDeck() { currentDeck = []; showNotification("POOL RESETTATO"); }
        function adjustCount(v) {
            const mob = document.getElementById('wordCount');
            const desk = document.getElementById('wordCountDesktop');
            const cur = parseInt((mob || desk).value);
            const n = cur + v;
            if (n >= 1 && n <= 10) { if(mob) mob.value=n; if(desk) desk.value=n; }
        }

        function updateQuickSelect() {
            const container = document.getElementById('quickSelectTags');
            const allTags = new Set();
            words.forEach(w => w.tags.forEach(t => allTags.add(t.toLowerCase())));
            const currentInputTags = document.getElementById('newTags').value.split(',').map(s => s.trim().toLowerCase());
            container.innerHTML = [...allTags].sort().map(t => {
                const isActive = currentInputTags.includes(t);
                return `<button onclick="toggleTagInInput('${t}')"class="text-[11px] px-3 py-1.5 rounded-md border uppercase transition-all ${isActive ? 'bg-cyan-500 text-black border-cyan-300' : 'bg-slate-800 text-cyan-400 border-slate-700'}">${t}</button>`;
            }).join('');
        }

        function toggleTagInInput(tag) {
            const input = document.getElementById('newTags');
            let current = input.value.split(',').map(s => s.trim().toLowerCase()).filter(s => s);
            if (current.includes(tag)) current = current.filter(t => t !== tag);
            else current.push(tag);
            input.value = current.join(', ');
            updateQuickSelect();
        }

        function handleTableSearch() { searchQuery = document.getElementById('tableSearch').value.toLowerCase(); currentPage = 1; renderTable(); }

        function renderArchiveSearchTags() {
            const container = document.getElementById('archiveTagFilters');

            // 1. Contiamo quante volte appare ogni tag nel database
            const tagCounts = {};
            words.forEach(w => {
                w.tags.forEach(t => {
                    const lowerTag = t.toLowerCase();
                    tagCounts[lowerTag] = (tagCounts[lowerTag] || 0) + 1;
                });
            });

            // 2. Otteniamo la lista unica dei tag
            const allTags = Object.keys(tagCounts).sort();

            // 3. Generiamo l'HTML includendo il conteggio tra parentesi
            container.innerHTML = allTags.map(tag => {
                const active = archiveSearchTags.has(tag);
                const count = tagCounts[tag];
                return `
                    <button onclick="toggleArchiveTag('${tag}')"
                        class="px-4 py-2 rounded-lg text-[11px] font-bold border uppercase transition-all
                        ${active ? 'bg-cyan-500 text-black border-cyan-300 shadow-[0_0_10px_rgba(0,255,242,0.4)]' : 'bg-slate-900 text-slate-500 border-slate-800'}">
                        ${tag} (${count})
                    </button>`;
            }).join('');
        }

        function toggleArchiveTag(t) { if(archiveSearchTags.has(t)) archiveSearchTags.delete(t); else archiveSearchTags.add(t); currentPage = 1; renderArchiveSearchTags(); renderTable(); }

        function renderTable() {
            const tbody = document.getElementById('wordTableBody');
            let filtered = [...words].reverse().filter(w => {
                const matchesText = w.text.toLowerCase().includes(searchQuery);
                const matchesTags = archiveSearchTags.size === 0 || [...archiveSearchTags].every(t => w.tags.some(wt => wt.toLowerCase() === t.toLowerCase()));
                return matchesText && matchesTags;
            });

            const paginatedItems = filtered.slice((currentPage - 1) * itemsPerPage, currentPage * itemsPerPage);
            const allDatabaseTags = [...new Set(words.flatMap(w => w.tags.map(t => t.toLowerCase())))].sort();

            tbody.innerHTML = paginatedItems.map((w) => {
                // Troviamo l'indice reale nell'array originale 'words'
                const idx = words.findIndex(item => item.text === w.text);
                const isAdding = editingTagIndex === idx;

                return `
                <tr class="hover:bg-cyan-900/5 transition">
                    <td class="p-4">
                        <div contenteditable="true"
                             onblur="updateWordText(${idx}, this.innerText)"
                             class="font-bold text-slate-200 outline-none focus:text-cyan-400 focus:bg-slate-800/50 px-2 py-1 rounded transition-all cursor-edit"
                             spellcheck="false">
                            ${w.text}
                        </div>
                    </td>
                    <td class="p-4">
                        <div class="flex flex-wrap gap-1 items-center">
                            ${w.tags.map(t => `<span class="bg-slate-900 text-cyan-600 px-2 py-0.5 rounded text-[9px] uppercase cursor-pointer" onclick="removeTagFromWord(${idx}, '${t}')">${t} ×</span>`).join('')}
                            ${isAdding ? `<select onchange="confirmInlineTag(${idx}, this.value)" class="bg-slate-800 text-cyan-400 text-[10px] rounded"><option value="">+</option>${allDatabaseTags.filter(t => !w.tags.map(wt=>wt.toLowerCase()).includes(t)).map(t => `<option value="${t}">${t.toUpperCase()}</option>`).join('')}</select>` : `<button onclick="editingTagIndex=${idx};renderTable()" class="text-cyan-800 text-xs">+</button>`}
                        </div>
                    </td>
                    <td class="p-4 text-right">
                        <button onclick="deleteWord(${idx})" style="font-family:'Rajdhani',sans-serif;font-size:0.65rem;font-weight:700;background:none;border:none;color:#7f1d1d;cursor:pointer;text-transform:uppercase;transition:color 0.2s;" onmouseover="this.style.color='#ff2e63'" onmouseout="this.style.color='#7f1d1d'">Elimina</button>
                    </td>
                </tr>`;
            }).join('');

            document.getElementById('paginationInfo').innerText = `Pagina ${currentPage} di ${Math.ceil(filtered.length/itemsPerPage) || 1}`;
        }

        function confirmInlineTag(idx, val) { if(val) words[idx].tags.push(val); editingTagIndex = null; save(); init(); }
        function removeTagFromWord(wi, t) { words[wi].tags = words[wi].tags.filter(tag => tag !== t); if(words[wi].tags.length === 0) words[wi].tags = ['generale']; save(); init(); }
        function deleteWord(i) { words.splice(i, 1); save(); init(); }
        function updateWordText(index, newText) {
            const cleanText = newText.trim();
            const oldText = words[index].text;

            // Se il testo non è cambiato o è vuoto, ripristina e annulla
            if (!cleanText || cleanText === oldText) {
                renderTable();
                return;
            }

            // Controllo duplicati: esiste già questo testo in un'ALTRA posizione?
            const exists = words.some((w, i) => i !== index && w.text.toLowerCase() === cleanText.toLowerCase());

            if (exists) {
                showNotification("ERRORE: PAROLA GIÀ ESISTENTE");
                renderTable(); // Forza il refresh per cancellare il testo duplicato appena scritto
                return;
            }

            // Aggiorna l'array e salva
            words[index].text = cleanText;
            save();
            // Aggiorniamo i filtri in caso la parola fosse l'unica con quel nome nella dashboard
            renderTags();
            showNotification("VOCE AGGIORNATA");
        }
        function prevPage() { if(currentPage > 1) { currentPage--; renderTable(); } }
        function nextPage() { if(currentPage < Math.ceil(words.length/itemsPerPage)) { currentPage++; renderTable(); } }

        function addWordsBulk() {
            const text = document.getElementById('newWords').value;
            const lines = text.split('\n').map(l => l.trim()).filter(l => l);
            const tagsInput = document.getElementById('newTags').value || 'generale';
            const newTags = tagsInput.split(',').map(t => t.trim().toLowerCase()).filter(t => t);

            let addedCount = 0;
            let updatedCount = 0;

            lines.forEach(lineText => {
                // Cerca se la parola esiste già
                const existingWord = words.find(w => w.text.toLowerCase() === lineText.toLowerCase());

                if (existingWord) {
                    // Se esiste, aggiungi solo i tag che non ha già
                    newTags.forEach(tag => {
                        if (!existingWord.tags.includes(tag)) {
                            existingWord.tags.push(tag);
                            updatedCount++;
                        }
                    });
                } else {
                    // Se non esiste, crea la nuova voce
                    words.push({ text: lineText, tags: [...newTags] });
                    addedCount++;
                }
            });

            document.getElementById('newWords').value = '';
            document.getElementById('newTags').value = '';
            save();
            init();

            showNotification(`AGGIUNTI: ${addedCount} | TAG AGGIORNATI: ${updatedCount}`);
        }

        function renderTags() {
            const container = document.getElementById('tagFilters');

            // 1. Contiamo le occorrenze per ogni tag
            const tagCounts = {};
            words.forEach(w => {
                w.tags.forEach(t => {
                    const lowerTag = t.toLowerCase();
                    tagCounts[lowerTag] = (tagCounts[lowerTag] || 0) + 1;
                });
            });

            // 2. Otteniamo la lista unica dei tag ordinata
            const allTags = Object.keys(tagCounts).sort();

            // 3. Generiamo l'HTML con i numeri e lo stile più grande (px-4 py-2 e text-xs)
            const tagsHtml = allTags.map(t => {
                const active = activeTags.has(t);
                const count = tagCounts[t];
                return `
                    <button onclick="toggleTag('${t}')"
                        class="px-4 py-2 rounded-lg text-xs font-bold border uppercase transition-all hover:border-cyan-500
                        ${active ? 'bg-cyan-600 text-white border-cyan-400 shadow-[0_0_10px_rgba(0,255,242,0.3)]' : 'bg-slate-900 text-slate-500 border-slate-800'}">
                        ${t} (${count})
                    </button>`;
            }).join('');
            container.innerHTML = tagsHtml;
            const mob = document.getElementById('tagFiltersMobile');
            if (mob) mob.innerHTML = tagsHtml;
        }

        function toggleTag(t) {
    if(activeTags.has(t)) activeTags.delete(t);
    else activeTags.add(t);
    resetDeck(); // Forza la rigenerazione del mazzo con i nuovi filtri
    renderTags();
}

function generate() {
    const display = document.getElementById('displayArea');
    const _wc = document.getElementById('wordCount') || document.getElementById('wordCountDesktop');
    const count = parseInt(_wc.value);

    // Filtra le parole in base ai tag attivi
    let filtered = activeTags.size > 0
        ? words.filter(w => w.tags.some(t => activeTags.has(t.toLowerCase())))
        : words;

    if(filtered.length === 0) return;

    let results = [];
    for(let i=0; i<count; i++) {
        // Se il mazzo è vuoto O se sono stati cambiati i filtri, ricrealo
        if(currentDeck.length === 0) {
            currentDeck = [...filtered].sort(() => Math.random() - 0.5);
        }

        // Estrai l'elemento. Se per errore è undefined (mazzo finito), rigenera
        let picked = currentDeck.pop();
        if(!picked) {
            currentDeck = [...filtered].sort(() => Math.random() - 0.5);
            picked = currentDeck.pop();
        }
        results.push(picked.text);
    }

    display.innerHTML = results.map((res, i) => {
        const isCyan = i % 2 === 0;
        const color = isCyan ? 'var(--neon-cyan)' : 'var(--alt-color)';
        const altColor = getComputedStyle(document.documentElement).getPropertyValue('--alt-color').trim();
        const palette = document.documentElement.getAttribute('data-palette') || 'switch';

        let shadow;
        if (palette === 'cyberpunk') {
            // Opzione D: blocco solida + glow neon sul bianco
            const cyanShadow = '2px 3px 0px #003d3c, 0 0 14px rgba(0,255,242,0.5)';
            const whiteShadow = '2px 3px 0px #333333, 0 0 14px rgba(255,255,255,0.4)';
            shadow = isCyan ? cyanShadow : whiteShadow;
        } else if (palette === 'retrowave') {
            // Opzione D: blocco solida colorata
            const cyanShadow = '2px 3px 0px #6b0022';
            const altShadow  = '2px 3px 0px #7a3000';
            shadow = isCyan ? cyanShadow : altShadow;
        } else if (palette === 'marvin') {
            // Opzione C: ombra azzurra chiara
            const cyanShadow = '1px 2px 0px rgba(0,173,181,0.35), 0 0 10px rgba(0,173,181,0.25)';
            const isAltDark = altColor === '#000000' || altColor === '#000' || altColor.toLowerCase() === '#000000';
            const altShadow  = isAltDark ? 'none' : '1px 2px 0px rgba(0,173,181,0.25)';
            shadow = isCyan ? cyanShadow : altShadow;
        } else {
            // Switch e altri: glow + ombra scura
            const cyanShadow = '0 0 12px var(--neon-cyan), 2px 3px 6px rgba(0,0,0,0.9)';
            const isAltDark = altColor === '#000000' || altColor === '#000' || altColor.toLowerCase() === '#000000';
            const altShadow  = isAltDark ? 'none' : `0 0 12px ${altColor}, 2px 3px 6px rgba(0,0,0,0.9)`;
            shadow = isCyan ? cyanShadow : altShadow;
        }
        return `<div class="animate-fade font-extrabold text-center" style="color:${color}; text-shadow:${shadow}; overflow-wrap:normal; word-break:keep-all; hyphens:none; line-height:0.94;">${res}</div>`;
    }).join('');
    fitTextToContainer();
}

function fitTextToContainer() {
    const display = document.getElementById('displayArea');
    const items = display.querySelectorAll('div.animate-fade');
    if (!items.length) return;

    const pad = 32;
    const availableWidth = display.clientWidth - pad * 2;
    const availableHeight = display.clientHeight - pad * 2;

    // Setup iniziale
    items.forEach(el => {
        el.style.width = availableWidth + 'px';
        el.style.flexShrink = '0';
        el.style.whiteSpace = 'normal';
        el.style.marginBottom = '0';
    });

    // Binary search: gap = 0.7 * fontSize
    let lo = 8, hi = 42;
    while (lo < hi) {
        const mid = Math.ceil((lo + hi) / 2);
        const gap = Math.round(mid * 0.7);
        items.forEach(el => el.style.fontSize = mid + 'px');
        const totalH = Array.from(items).reduce((sum, el) => sum + el.scrollHeight, 0)
                      + gap * (items.length - 1);
        const anyOverflow = Array.from(items).some(el => el.scrollWidth > availableWidth + 1);
        if (totalH <= availableHeight && !anyOverflow) lo = mid;
        else hi = mid - 1;
    }

    // Applica font finale e gap come margin-bottom tranne sull'ultimo
    const finalGap = Math.round(lo * 0.7);
    const itemsArr = Array.from(items);
    itemsArr.forEach((el, i) => {
        el.style.fontSize = lo + 'px';
        el.style.marginBottom = i < itemsArr.length - 1 ? finalGap + 'px' : '0';
    });

    // Centra verticalmente con padding-top
    const totalH = itemsArr.reduce((sum, el) => sum + el.scrollHeight, 0)
                  + finalGap * (itemsArr.length - 1);
    const topPad = Math.max(pad, (display.clientHeight - totalH) / 2);
    display.style.paddingTop = topPad + 'px';
    display.style.paddingBottom = topPad + 'px';
}

        function exportData() { const dl = document.createElement('a'); dl.setAttribute("href", "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(words))); dl.setAttribute("download", "backup.json"); dl.click(); }
        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedWords = JSON.parse(e.target.result);
                    if (Array.isArray(importedWords)) {
                        let addedCount = 0;
                        let updatedTagsCount = 0;

                        importedWords.forEach(importedItem => {
                            const existingWord = words.find(w => w.text.toLowerCase() === importedItem.text.toLowerCase());

                            if (existingWord) {
                                // Unisci i tag del file con quelli esistenti evitando duplicati
                                importedItem.tags.forEach(tag => {
                                    const lowerTag = tag.toLowerCase();
                                    if (!existingWord.tags.map(t => t.toLowerCase()).includes(lowerTag)) {
                                        existingWord.tags.push(lowerTag);
                                        updatedTagsCount++;
                                    }
                                });
                            } else {
                                // Aggiungi la parola nuova
                                words.push(importedItem);
                                addedCount++;
                            }
                        });

                        save();
                        init();
                        resetDeck();
                        showNotification(`NUOVE VOCI: ${addedCount} | TAG UNIFICATI: ${updatedTagsCount}`);
                    }
                } catch (err) {
                    showNotification("ERRORE NEL FORMATO DEL FILE");
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function toggleDrawer() {
            document.getElementById('drawer').classList.toggle('open');
            document.getElementById('drawerOverlay').classList.toggle('open');
        }
        function closeDrawer() {
            document.getElementById('drawer').classList.remove('open');
            document.getElementById('drawerOverlay').classList.remove('open');
        }

        window.addEventListener('keydown', (e) => {
            // Controlla se l'utente sta scrivendo in un input, textarea o un elemento contenteditable
            const isEditing = [ 'INPUT', 'TEXTAREA' ].includes(document.activeElement.tagName) ||
                               document.activeElement.isContentEditable;

            if(e.code === 'Space' && !isEditing) {
                e.preventDefault();
                generate();
            }
        });
        document.getElementById('newTags').addEventListener('input', updateQuickSelect);
        function placeDisplayArea() {
            const slot = document.getElementById('displayAreaSlot');
            const da = document.getElementById('displayArea');
            if (!slot || !da) return;
            if (window.innerWidth >= 1024) {
                da.style.position = 'static';
                da.style.height = '450px';
                da.style.borderRadius = '';
                da.style.border = '';
                da.style.padding = '40px';
                slot.innerHTML = '';
                slot.appendChild(da);
            }
        }
        placeDisplayArea();
        window.addEventListener('resize', placeDisplayArea);

        // ── PALETTE SWITCHER ──
        const PALETTES = [
            { id: 'switch',    label: 'Switch'    },
            { id: 'cyberpunk', label: 'Cyberpunk' },
            { id: 'retrowave', label: 'Retrowave' },
            { id: 'marvin',    label: 'Marvin'    },
        ];

        function buildPaletteSelectors() {
            ['paletteSelectorMobile', 'paletteSelectorDesktop'].forEach(id => {
                const sel = document.getElementById(id);
                if (!sel) return;
                sel.innerHTML = PALETTES.map(p =>
                    `<option value="${p.id}">${p.label}</option>`
                ).join('');
            });
        }

        const PALETTE_GRADIENTS = {
            cyberpunk: ['0,255,242',   '188,19,254'],
            retrowave: ['222,26,88',   '246,125,49'],
            marvin:    ['0,173,181',   '0,173,181'],
            switch:    ['8,217,214',   '255,46,99'],
        };

        function applyPalette(name) {
            document.documentElement.setAttribute('data-palette', name);
            localStorage.setItem('palette', name);
            ['paletteSelectorMobile', 'paletteSelectorDesktop'].forEach(id => {
                const sel = document.getElementById(id);
                if (sel) sel.value = name;
            });
            // Applica gradiente su displayArea
            const g = PALETTE_GRADIENTS[name] || PALETTE_GRADIENTS['cyberpunk'];
            const grad = `radial-gradient(circle at 15% 25%, rgba(${g[0]},0.07) 0%, transparent 45%),
                          radial-gradient(circle at 85% 75%, rgba(${g[1]},0.07) 0%, transparent 45%)`;
            const da = document.getElementById('displayArea');
            if (da) da.style.backgroundImage = grad;

            // Ricalcola le shadow degli elementi già generati con i colori del nuovo tema
            const items = document.querySelectorAll('#displayArea div.animate-fade');
            if (items.length) {
                const altColor = getComputedStyle(document.documentElement).getPropertyValue('--alt-color').trim();
                const isAltDark = altColor === '#000000' || altColor === '#000' || altColor.toLowerCase() === '#000000';
                items.forEach((el, i) => {
                    const isCyan = i % 2 === 0;
                    let shadow;
                    if (name === 'cyberpunk') {
                        const cyanShadow = '2px 3px 0px #003d3c, 0 0 14px rgba(0,255,242,0.5)';
                        const whiteShadow = '2px 3px 0px #333333, 0 0 14px rgba(255,255,255,0.4)';
                        shadow = isCyan ? cyanShadow : whiteShadow;
                    } else if (name === 'retrowave') {
                        const cyanShadow = '2px 3px 0px #6b0022';
                        const altShadow  = '2px 3px 0px #7a3000';
                        shadow = isCyan ? cyanShadow : altShadow;
                    } else if (name === 'marvin') {
                        const cyanShadow = '1px 2px 0px rgba(0,173,181,0.35), 0 0 10px rgba(0,173,181,0.25)';
                        const altShadow  = isAltDark ? 'none' : '1px 2px 0px rgba(0,173,181,0.25)';
                        shadow = isCyan ? cyanShadow : altShadow;
                    } else {
                        const cyanShadow = '0 0 12px var(--neon-cyan), 2px 3px 6px rgba(0,0,0,0.9)';
                        const altShadow  = isAltDark ? 'none' : `0 0 12px ${altColor}, 2px 3px 6px rgba(0,0,0,0.9)`;
                        shadow = isCyan ? cyanShadow : altShadow;
                    }
                    el.style.color = isCyan ? 'var(--neon-cyan)' : 'var(--alt-color)';
                    el.style.textShadow = shadow;
                });
            }
        }

        buildPaletteSelectors();
        const savedPalette = localStorage.getItem('palette') || 'switch';
        applyPalette(savedPalette);

        if (_firstLoad) loadDefaultDB(); else init();
    </script>
